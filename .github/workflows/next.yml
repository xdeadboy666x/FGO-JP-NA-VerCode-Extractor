name: Fate Grand Order VerCode extractor tool

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '30 * * * *'

jobs:
  update:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - region: jp
            id: com.aniplex.fategrandorder
            apk_url: https://fgo.bigcereal.com/apk/com.aniplex.fategrandorder.xapk
            file: jp.json
          - region: na
            id: com.aniplex.fategrandorder.en
            apk_url: https://fgo.bigcereal.com/apk/com.aniplex.fategrandorder.en.xapk
            file: na.json

    permissions:
      packages: write
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Latest ${{ matrix.region }} Game Version
        run: |
          VERSION=$(curl -s "https://gplay-ver.atlasacademy.workers.dev/?id=${{ matrix.id }}" | jq -r '.version')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Compare with Stored ${{ matrix.region }} Version
        run: |
          if [ -f "${{ matrix.file }}" ]; then
            APP_VERSION=$(jq -r '.appVer' "${{ matrix.file }}")
          else
            APP_VERSION=""
          fi

          if [ "$APP_VERSION" = "$VERSION" ]; then
            echo "UPDATE=false" >> $GITHUB_ENV
          else
            echo "UPDATE=true" >> $GITHUB_ENV
          fi

      - name: Set Up Java 21
        if: env.UPDATE == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download FGO-VCE Tool
        if: env.UPDATE == 'true'
        run: wget -O fgo-vce.jar "https://github.com/O-Isaac/FGO-VCE/releases/download/v1.0.51-beta/FGO-VCE-1.0-SNAPSHOT-jar-with-dependencies.jar"

      - name: Download ${{ matrix.region }} APK
        if: env.UPDATE == 'true'
        run: wget -O fate.xapk "${{ matrix.apk_url }}"

      - name: Extract ${{ matrix.region }} verCode
        if: env.UPDATE == 'true'
        run: java -jar fgo-vce.jar -av $VERSION -o ${{ matrix.file }} -xa fate.xapk

      - name: Set Commit Timestamp
        if: env.UPDATE == 'true'
        run: echo "DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV

      - name: Commit ${{ matrix.region }} verCode Update
        if: env.UPDATE == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          pull: '--rebase --autostash'
          add: '${{ matrix.file }}'
          default_author: github_actions
          message: '✨ Update for ${{ matrix.region }} - Commit on ${{ env.DATE }} 🚀'

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1